name: Notify plugin repos

on:
  push:
    branches: [main]

jobs:
  notify:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        repo:
          - alexeyhimself/product-operating-model-claude-plugin
          - alexeyhimself/product-operating-model-codex-plugin
    steps:
      - name: Dispatch wiki-updated event to ${{ matrix.repo }}
        uses: peter-evans/repository-dispatch@v4
        with:
          token: ${{ secrets.PLUGIN_REPO_TOKEN }}
          repository: ${{ matrix.repo }}
          event-type: wiki-updated
